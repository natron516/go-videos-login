<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — GO Videos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #e53935, #b71c1c);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 20px;
    }
    h1 { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 28px; }
    .tv-code {
      background: #111;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 24px;
      text-align: center;
      border: 1px solid #333;
    }
    .tv-code span { color: #e53935; font-weight: 700; font-size: 18px; letter-spacing: 3px; }
    .btn {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn:hover { background: #f0f0f0; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .g-logo {
      width: 20px; height: 20px;
      background: url('https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg') center/contain no-repeat;
    }
    .error { color: #ff5252; font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; }
    .success {
      text-align: center;
      padding: 20px;
    }
    .success .check { font-size: 56px; margin-bottom: 16px; }
    .success h2 { font-size: 20px; margin-bottom: 8px; }
    .success p { color: #888; font-size: 14px; }
    .loading { text-align: center; color: #888; font-size: 14px; padding: 20px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📺</div>
    <h1>GO Videos</h1>
    <p class="subtitle" id="subtitle">Sign in to continue</p>

    <div class="tv-code" id="codeDisplay" style="display:none">
      Linking TV code: <span id="codeValue"></span>
    </div>

    <div id="authForm">
      <button class="btn" id="googleBtn" onclick="handleGoogle()">
        <div class="g-logo"></div>
        Sign in with Google
      </button>
      <div id="errorMsg" class="error"></div>
    </div>

    <div id="loadingScreen" class="loading" style="display:none">
      Redirecting to Google…
    </div>

    <div id="successScreen" class="success" style="display:none">
      <div class="check">✅</div>
      <h2>You're signed in!</h2>
      <p id="successMsg">Your TV should update automatically.</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const app = initializeApp({
      apiKey: "AIzaSyAIP7-0-Ciop8tK0yOLwcSJhvwW6jPSKEo",
      authDomain: "gospel-outreach-tv.firebaseapp.com",
      projectId: "gospel-outreach-tv",
      storageBucket: "gospel-outreach-tv.appspot.com",
      messagingSenderId: "419198793314",
      appId: "1:419198793314:ios:0f75087a30ce0f23da433b"
    });
    const auth = getAuth(app);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const sessionCode = params.get('code');

    if (sessionCode) {
      document.getElementById('codeDisplay').style.display = 'block';
      document.getElementById('codeValue').textContent = sessionCode;
      document.getElementById('subtitle').textContent = 'Sign in to connect your TV';
    }

    // Handle redirect result on return from Google
    getRedirectResult(auth).then(async (result) => {
      if (result && result.user) {
        await completeSignIn(result.user.uid);
      }
    }).catch((e) => {
      document.getElementById('errorMsg').textContent = e.message;
    });

    window.handleGoogle = () => {
      document.getElementById('authForm').style.display = 'none';
      document.getElementById('loadingScreen').style.display = 'block';
      const provider = new GoogleAuthProvider();
      signInWithRedirect(auth, provider);
    };

    async function completeSignIn(uid) {
      if (sessionCode) {
        await setDoc(doc(db, 'tvSessions', sessionCode), {
          uid,
          status: 'pending_token',
          createdAt: serverTimestamp()
        }, { merge: true });
        showSuccess('Your TV should sign in automatically in a moment.');
      } else {
        showSuccess("You're signed in! Open the app to continue.");
      }
    }

    function showSuccess(msg) {
      document.getElementById('authForm').style.display = 'none';
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('successMsg').textContent = msg;
      document.getElementById('successScreen').style.display = 'block';
    }
  </script>
</body>
</html>
