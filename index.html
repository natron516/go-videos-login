<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — GO Videos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #e53935, #b71c1c);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 20px;
    }
    h1 { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 28px; }
    .tv-code {
      background: #111;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 24px;
      text-align: center;
      border: 1px solid #333;
    }
    .tv-code span { color: #e53935; font-weight: 700; font-size: 18px; letter-spacing: 3px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #111;
      border: 1.5px solid #333;
      border-radius: 10px;
      padding: 14px 16px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #e53935; }
    .btn {
      width: 100%;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 12px;
    }
    .btn:hover { background: #c62828; }
    .btn:disabled { background: #444; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      border: 1.5px solid #333;
      color: #aaa;
    }
    .btn-secondary:hover { border-color: #555; background: #1f1f1f; }
    .error { color: #ff5252; font-size: 13px; text-align: center; margin-bottom: 12px; min-height: 18px; }
    .success {
      text-align: center;
      padding: 20px;
    }
    .success .check { font-size: 56px; margin-bottom: 16px; }
    .success h2 { font-size: 20px; margin-bottom: 8px; }
    .success p { color: #888; font-size: 14px; }
    .toggle { text-align: center; font-size: 13px; color: #888; margin-top: 8px; }
    .toggle a { color: #e53935; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📺</div>
    <h1>GO Videos</h1>
    <p class="subtitle" id="subtitle">Sign in to your account</p>

    <div class="tv-code" id="codeDisplay" style="display:none">
      Linking TV code: <span id="codeValue"></span>
    </div>

    <div id="authForm">
      <div id="errorMsg" class="error"></div>
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
      <label>Password</label>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
      <button class="btn" id="googleBtn" onclick="handleGoogle()">🔵 Sign in with Google</button>
      <div style="text-align:center; color:#555; font-size:13px; margin:8px 0">— or —</div>
      <button class="btn" id="actionBtn" onclick="handleAction()">Sign In with Email</button>
      <div class="toggle">
        <span id="toggleText">Don't have an account?</span>
        <a onclick="toggleMode()">Sign Up</a>
      </div>
    </div>

    <div id="successScreen" class="success" style="display:none">
      <div class="check">✅</div>
      <h2>You're signed in!</h2>
      <p id="successMsg">Your TV should update automatically.</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const app = initializeApp({
      apiKey: "AIzaSyAIP7-0-Ciop8tK0yOLwcSJhvwW6jPSKEo",
      authDomain: "gospel-outreach-tv.firebaseapp.com",
      projectId: "gospel-outreach-tv",
      storageBucket: "gospel-outreach-tv.appspot.com",
      messagingSenderId: "419198793314",
      appId: "1:419198793314:ios:0f75087a30ce0f23da433b"
    });
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Get session code from URL
    const params = new URLSearchParams(window.location.search);
    const sessionCode = params.get('code');
    let isSignUp = false;

    if (sessionCode) {
      document.getElementById('codeDisplay').style.display = 'block';
      document.getElementById('codeValue').textContent = sessionCode;
      document.getElementById('subtitle').textContent = 'Sign in to connect your TV';
    }

    window.handleGoogle = async () => {
      const btn = document.getElementById('googleBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const provider = new GoogleAuthProvider();
        const cred = await signInWithPopup(auth, provider);
        await completeSignIn(cred.user.uid);
      } catch(e) {
        btn.disabled = false;
        btn.textContent = '🔵 Sign in with Google';
        document.getElementById('errorMsg').textContent = e.code === 'auth/popup-closed-by-user' ? '' : e.message;
      }
    };

    async function completeSignIn(uid) {
      if (sessionCode) {
        await setDoc(doc(db, 'tvSessions', sessionCode), { uid, status: 'pending_token', createdAt: serverTimestamp() }, { merge: true });
        showSuccess('Your TV should sign in automatically in a moment.');
      } else {
        showSuccess('You\'re signed in!');
      }
    }

    window.toggleMode = () => {
      isSignUp = !isSignUp;
      document.getElementById('actionBtn').textContent = isSignUp ? 'Create Account' : 'Sign In';
      document.getElementById('toggleText').textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
      document.querySelector('.toggle a').textContent = isSignUp ? 'Sign In' : 'Sign Up';
      document.getElementById('errorMsg').textContent = '';
    };

    window.handleAction = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('actionBtn');
      const errEl = document.getElementById('errorMsg');

      if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }

      btn.disabled = true;
      btn.textContent = isSignUp ? 'Creating account…' : 'Signing in…';
      errEl.textContent = '';

      try {
        const cred = isSignUp
          ? await createUserWithEmailAndPassword(auth, email, password)
          : await signInWithEmailAndPassword(auth, email, password);

        await completeSignIn(cred.user.uid);
      } catch (e) {
        btn.disabled = false;
        btn.textContent = isSignUp ? 'Create Account' : 'Sign In';
        const msgs = {
          'auth/user-not-found': 'No account found with that email.',
          'auth/wrong-password': 'Incorrect password.',
          'auth/email-already-in-use': 'An account with that email already exists.',
          'auth/invalid-email': 'Please enter a valid email address.',
          'auth/weak-password': 'Password must be at least 6 characters.',
          'auth/too-many-requests': 'Too many attempts. Please try again later.',
        };
        errEl.textContent = msgs[e.code] || e.message;
      }
    };

    function showSuccess(msg) {
      document.getElementById('authForm').style.display = 'none';
      document.getElementById('successMsg').textContent = msg;
      document.getElementById('successScreen').style.display = 'block';
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.handleAction();
    });
  </script>
</body>
</html>
